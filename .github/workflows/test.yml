name: 🔬 Test
run-name: "🔬 Windows MCL investigation ${{ github.ref_name }} -> manticore ${{ inputs.manticore_ref || 'mcl_win_error' }}"

on:
  workflow_dispatch:
    inputs:
      manticore_ref:
        description: "Manticore branch/ref to test"
        required: false
        default: "mcl_win_error"
      tests:
        description: "Space/comma separated ubertest ids; use all to run the full 345_and_on shard"
        required: false
        default: "481 484 486 489 490 491 501"

concurrency:
  group: CI_${{ github.ref }}
  cancel-in-progress: true

jobs:
  commit_info:
    name: Commit info
    runs-on: ubuntu-22.04
    steps:
      - run: |
          echo "# Windows MCL investigation of commit ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "* Commit URL: [${{ github.sha }}](/${{ github.repository }}/commit/${{ github.sha }})" >> $GITHUB_STEP_SUMMARY
          echo "* Initiated by: [@${{ github.actor }}](https://github.com/${{ github.actor }})" >> $GITHUB_STEP_SUMMARY
          echo "* Ref: ${{ github.ref_type }} \"${{ github.ref_name }}\"" >> $GITHUB_STEP_SUMMARY
          echo "* Manticore ref: ${{ inputs.manticore_ref || 'mcl_win_error' }}" >> $GITHUB_STEP_SUMMARY
          echo "* Tests: ${{ inputs.tests || '481 484 486 489 490 491 501' }}" >> $GITHUB_STEP_SUMMARY
          echo "* Attempt: ${{ github.run_attempt }}" >> $GITHUB_STEP_SUMMARY

  check_branch:
    name: Resolve Manticore ref
    runs-on: ubuntu-22.04
    outputs:
      manticore_locator: ${{ steps.set_locator.outputs.manticore_locator }}
      ref: ${{ steps.set_locator.outputs.ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Manticore Locator
        id: set_locator
        run: |
          set -euo pipefail
          REF="${{ inputs.manticore_ref || 'mcl_win_error' }}"
          if [[ -z "$REF" ]]; then
            REF="mcl_win_error"
          fi

          echo "Checking manticoresoftware/manticoresearch ref '$REF'..."
          if ! git ls-remote --exit-code --heads --tags https://github.com/manticoresoftware/manticoresearch.git "$REF" >/dev/null; then
            echo "Manticore ref '$REF' was not found as a branch or tag"
            exit 1
          fi

          LOCATOR="GIT_REPOSITORY https://github.com/manticoresoftware/manticoresearch.git GIT_TAG $REF GIT_SUBMODULES \"\""
          echo "manticore_locator=$LOCATOR" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Set manticore_locator: $LOCATOR"
          echo "* Manticore locator: \`$LOCATOR\`" >> "$GITHUB_STEP_SUMMARY"

  embedding_windows_pack:
    needs: commit_info
    uses: ./.github/workflows/embedding_build_template.yml
    strategy:
      fail-fast: false
      matrix:
        distr: [windows]
        arch: [x86_64]
    name: ${{ matrix.distr }} ${{ matrix.arch }} embedding packing
    with:
      distr: ${{ matrix.distr }}
      arch: ${{ matrix.arch }}

  build_windows:
    name: Windows x64 build
    needs: [embedding_windows_pack, check_branch]
    uses: ./.github/workflows/build_template.yml
    with:
      DISTR: windows
      arch: x64
      CTEST_CMAKE_GENERATOR: "Ninja Multi-Config"
      CTEST_CONFIGURATION_TYPE: Debug
      cache_key: build_windows_x64
      artifact_list: "build/columnar/Debug/*.dll build/columnar/Debug/*.pdb build/secondary/Debug/*.dll build/secondary/Debug/*.pdb build/knn/Debug/*.dll build/knn/Debug/*.pdb build/_deps/manticore-build/src/Debug/indexer.exe build/_deps/manticore-build/src/Debug/indexer.pdb build/_deps/manticore-build/src/Debug/searchd.exe build/_deps/manticore-build/src/Debug/searchd.pdb build/_deps/manticore-build/src/Debug/*.dll"
      MANTICORE_LOCATOR: ${{ needs.check_branch.outputs.manticore_locator }}
      embeddings_artifact: embeddings_windows_x86_64

  test_windows:
    name: Windows tests
    needs: [build_windows, check_branch]
    uses: ./.github/workflows/win_test_template.yml
    with:
      CTEST_START: 345
      CTEST_END: 999999
      CTEST_REGEX_IDS: ${{ inputs.tests || '481 484 486 489 490 491 501' }}
      MANTICORE_LOCATOR: ${{ needs.check_branch.outputs.manticore_locator }}
      artifact_name: windows_test_345_and_on
      USE_AVX2: true
      FAIL_FAST: true

  windows_tests_report:
    name: Windows tests summary and report
    needs: test_windows
    runs-on: ubuntu-22.04
    container:
      image: manticoresearch/ubertests_ctest:3263_mar_2024
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download test report artifact 345_and_on
        uses: manticoresoftware/download_artifact_with_retries@v4
        continue-on-error: true
        with:
          name: windows_test_345_and_on
          path: .

      - name: Convert the XML to JUnit format
        run: for dir in build/xml_*; do test -f "$dir/Test.xml" && xsltproc -o "$dir/junit_tests.xml" misc/junit/ctest2junit.xsl "$dir/Test.xml"; done;
        shell: bash

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        continue-on-error: true
        with:
          check_name: Windows test results
          compare_to_earlier_commit: false
          files: build/xml_*/junit_tests.xml

      - name: Per-test results
        run: |
          for file in build/status*; do echo -n "$file: "; cat "$file"; done
          grep -o "success" build/status* | wc -l | awk '{if ($1==1) exit 0; else {print "Found only "$1" successful runs out of 1"; exit 1}}'
        shell: bash

      - name: Upload combined artifacts
        if: always()
        continue-on-error: true
        uses: manticoresoftware/upload_artifact_with_retries@v4
        with:
          name: windows_test_results
          path: build
